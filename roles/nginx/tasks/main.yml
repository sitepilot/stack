---
- name: Remove litespeed when proxy is disabled.
  ansible.builtin.apt:
    name: openlitespeed
    state: absent
    purge: true
  when: not litespeed_proxy_enabled

- name: Add nginx repository key.
  ansible.builtin.apt_key:
    id: "0x4F4EA0AAE5267A6C"
    keyserver: keyserver.ubuntu.com
    keyring: /etc/apt/trusted.gpg.d/nginx.gpg

- name: Add nginx repository.
  ansible.builtin.apt_repository:
    repo: "deb http://ppa.launchpad.net/ondrej/nginx/ubuntu {{ ansible_distribution_release }} main"
    filename: nginx
    update_cache: true

- name: Ensure nginx is installed.
  ansible.builtin.apt:
    name: nginx
    state: present
    cache_valid_time: 3600
  notify: reload nginx

- name: Create ping directory.
  ansible.builtin.file:
    path: /opt/ping
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Generate nginx configuration.
  ansible.builtin.template:
    src: "{{ item.template }}"
    dest: "{{ item.destination }}"
    mode: "0644"
  loop:
    - template: nginx.j2
      destination: /etc/nginx/nginx.conf
    - template: vhost.j2
      destination: /etc/nginx/sites-available/default
    - template: ping.j2
      destination: /opt/ping/index.php
  notify: reload nginx
