---
- ansible.builtin.assert:
    that:
      - backup_repo | length > 0
      - backup_tag | length > 0
      - backup_password | length > 0

- name: Initialize backup repository.
  ansible.builtin.command: "restic -r {{ backup_repo }} init"
  environment:
    AWS_ACCESS_KEY_ID: "{{ backup_s3_key }}"
    AWS_SECRET_ACCESS_KEY: "{{ backup_s3_secret }}"
    RESTIC_PASSWORD: "{{ backup_password }}"
  register: command_result
  failed_when: false
  changed_when: false

- name: Create database dump.
  community.mysql.mysql_db:
    state: dump
    name: app
    target: /app/private/backup.sql
    login_unix_socket: /run/mysqld/mysqld.sock
  when: "'mysql' in stack"

- name: Backup files.
  ansible.builtin.shell: set -o pipefail && restic backup -r {{ backup_repo }} --tag {{ backup_tag }} -q --json . | grep -v 'percent_done'
  environment:
    AWS_ACCESS_KEY_ID: "{{ backup_s3_key }}"
    AWS_SECRET_ACCESS_KEY: "{{ backup_s3_secret }}"
    RESTIC_PASSWORD: "{{ backup_password }}"
  args:
    chdir: /app
    executable: /usr/bin/bash
  changed_when: false
  register: result

- name: Print result.
  ansible.builtin.debug:
    msg: "{{ item | from_json }}"
  loop: "{{ result.stdout_lines }}"
